name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CRAFT_API_BASE_URL: ${{ secrets.CRAFT_API_BASE_URL }}
      CRAFT_API_TOKEN: ${{ secrets.CRAFT_API_TOKEN }}
      CRAFT_COLLECTION_ID: ${{ secrets.CRAFT_COLLECTION_ID }}
      CRAFT_COLLECTION_NAME: ${{ vars.CRAFT_COLLECTION_NAME || 'Posts' }}
      SITE_TITLE: ${{ vars.SITE_TITLE || 'Craft Journal' }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
